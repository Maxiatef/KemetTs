<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post — Kemet Blog</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Open+Sans:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #F5F7FA;
      --surface: #EBEEF4;
      --surface2: #E0E5EE;
      --text: #0F1419;
      --muted: #5A6B7F;
      --primary: #143c93;
      --accent: #ba1d49;
      --accent-warm: #d96f18;
      --border: rgba(20, 60, 147, 0.15);
      --dark: #0D0E10;
      --success: #22c55e;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Roboto', 'Open Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2.5rem;
      background: rgba(250, 248, 244, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Open Sans', 'Roboto', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      height: auto;
      min-height: 46px;
    }

    .nav-logo img {
      height: 46px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 1.6rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* underline that expands from center */
    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -0.28rem;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .nav-cta {
      background: var(--text);
      color: var(--bg);
      padding: 0.4rem 1rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .nav-cta:hover {
      background: var(--accent);
      color: var(--text);
    }

    /* CREATE PAGE */
    .create-page {
      padding-top: 100px;
      min-height: 100vh;
    }

    .create-header {
      padding: 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: white;
    }

    .create-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: var(--accent);
      color: white;
    }

    .create-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-draft {
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-draft:hover {
      background: var(--surface2);
    }

    .btn-publish {
      background: var(--accent);
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-publish:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    /* EDITOR */
    .editor-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .post-settings {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .post-settings-main {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .post-settings-side {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      color: var(--text);
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(186, 29, 73, 0.1);
    }

    .form-input.title-input {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      border: none;
      padding: 0.5rem 0;
      background: transparent;
    }

    .form-input.title-input:focus {
      box-shadow: none;
    }

    .form-input.title-input::placeholder {
      color: var(--border);
    }

    .form-textarea {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      color: var(--text);
      min-height: 100px;
      resize: vertical;
      transition: all 0.2s ease;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(186, 29, 73, 0.1);
    }

    .form-select {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'Roboto', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* COVER IMAGE */
    .cover-image-upload {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2rem;
      position: relative;
      overflow: visible;
    }

    .cover-image-upload:hover {
      border-color: var(--accent);
      background: rgba(186, 29, 73, 0.02);
    }

    .cover-image-upload.has-image {
      padding: 0;
      border-style: solid;
    }

    .cover-image-upload img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .cover-upload-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
    }

    .cover-upload-content svg {
      width: 40px;
      height: 40px;
      opacity: 0.5;
    }

    .cover-upload-content p {
      font-size: 0.9rem;
    }

    .cover-upload-content span {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    .remove-cover {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .cover-image-upload:hover .remove-cover {
      opacity: 1;
    }

    /* CONTENT EDITOR */
    .content-editor {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      border-radius: 10px 10px 0 0;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.10);
      position: sticky;
      top: 0;
      z-index: 120;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
    }

    .toolbar-btn:hover {
      background: white;
      color: var(--text);
    }

    .toolbar-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 22px rgba(186, 29, 73, 0.2);
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 6px 0.5rem;
    }

    .toolbar-btn svg {
      width: 18px;
      height: 18px;
    }

    .editor-area {
      min-height: 400px;
      padding: 2rem;
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text);
      outline: none;
    }

    .editor-area:empty::before {
      content: 'Start writing your story...';
      color: var(--border);
    }

    .editor-area h1, .editor-area h2, .editor-area h3 {
      font-family: 'Playfair Display', serif;
      margin: 1.5rem 0 1rem;
    }

    .editor-area h1 { font-size: 2rem; }
    .editor-area h2 { font-size: 1.6rem; }
    .editor-area h3 { font-size: 1.3rem; }

    .editor-area p {
      margin-bottom: 1rem;
    }

    .editor-area img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1.5rem 0;
    }

    .editor-area blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1.5rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--muted);
    }

    .editor-area ul, .editor-area ol {
      padding-left: 1.5rem;
      margin: 1rem 0;
    }

    .editor-area a {
      color: var(--accent);
      text-decoration: underline;
    }

    /* TOAST NOTIFICATION */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast svg {
      width: 20px;
      height: 20px;
    }

    body.blog-editor-page nav {
      position: relative;
      top: auto;
      left: auto;
      right: auto;
      width: calc(100% - 2rem);
      margin: 1rem auto 0;
    }

    body.blog-editor-page .create-page {
      padding-top: 1.5rem;
    }

    /* When sticky class is applied via JS, float it fixed above */

    /* Spacer that reserves the toolbar height when it goes sticky */
    .toolbar-spacer {
      display: none;
    }

    /* RESPONSIVE */
    @media(max-width:900px) {
      nav {
        padding: 1rem 1.5rem;
      }

      .nav-links {
        display: none;
      }

      .create-header {
        padding: 1.5rem;
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .editor-container {
        padding: 2rem 1.5rem;
      }

      .post-settings {
        grid-template-columns: 1fr;
      }

      .form-input.title-input {
        font-size: 1.6rem;
      }

      .editor-area {
        min-height: 300px;
        padding: 1.5rem;
      }

      body.blog-editor-page nav {
        width: calc(100% - 1.5rem);
        margin-top: 0.75rem;
      }

      .editor-toolbar.is-sticky {
        width: calc(100vw - 2rem);
      }
    }
  </style>
  <link rel="stylesheet" href="site-enhancements.css" />
  <script src="site-enhancements.js" defer></script>
</head>

<body class="blog-editor-page">

  <!-- NAV -->
  <nav>
    <a href="home.html" class="nav-logo"><img src="kemet-tec-op1-blue con-01.png" alt="Kemet Technologies Logo" /></a>
    <ul class="nav-links">
      <li><a href="services.html">Services</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="blogs.html" class="active">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html" class="nav-cta">Start Project</a>
  </nav>

  <!-- CREATE PAGE -->
  <div class="create-page">
    <div class="create-header">
      <div class="create-header-left">
        <a href="admingeorge.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </a>
        <h1>Create New Post</h1>
      </div>
      <div class="header-actions">
        <button class="btn-draft" onclick="saveDraft()">Save Draft</button>
        <button class="btn-publish" onclick="publishPost()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Publish
        </button>
      </div>
    </div>

    <div class="editor-container">
      <!-- COVER IMAGE -->
      <div class="cover-image-upload" id="coverUpload" onclick="document.getElementById('coverInput').click()">
        <div class="cover-upload-content" id="coverPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Add a cover image</p>
          <span>Recommended: 1200x630px</span>
        </div>
        <img id="coverPreview" style="display: none;" alt="Cover">
        <button class="remove-cover" id="removeCover" onclick="removeCoverImage(event)" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <input type="file" id="coverInput" accept="image/*" style="display: none;" onchange="handleCoverImage(event)">
      </div>

      <!-- POST SETTINGS -->
      <div class="post-settings">
        <div class="post-settings-main">
          <div class="form-group">
            <input type="text" class="form-input title-input" id="postTitle" placeholder="Post title...">
          </div>
          <div class="form-group">
            <label>Excerpt / Summary</label>
            <textarea class="form-textarea" id="postExcerpt" placeholder="Write a brief summary of your post..."></textarea>
          </div>
        </div>
        <div class="post-settings-side">
          <div class="form-group">
            <label>Category</label>
            <select class="form-select" id="postCategory">
              <option value="Technology">Technology</option>
              <option value="Design">Design</option>
              <option value="Development">Development</option>
              <option value="Business">Business</option>
              <option value="Tutorial">Tutorial</option>
              <option value="News">News</option>
            </select>
          </div>
          <div class="form-group">
            <label>Author</label>
            <input type="text" class="form-input" id="postAuthor" value="Kemet Team">
          </div>
        </div>
      </div>

      <!-- CONTENT EDITOR -->
      <div class="content-editor">
        <div class="editor-toolbar" id="editorToolbar">
          <button class="toolbar-btn" onclick="formatText('bold')" title="Bold" data-command="bold" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
              <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatText('italic')" title="Italic" data-command="italic" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="4" x2="10" y2="4"/>
              <line x1="14" y1="20" x2="5" y2="20"/>
              <line x1="15" y1="4" x2="9" y2="20"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatText('underline')" title="Underline" data-command="underline" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/>
              <line x1="4" y1="21" x2="20" y2="21"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatText('strikeThrough')" title="Strikethrough" data-command="strikeThrough" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4H9a3 3 0 0 0 0 6h6a3 3 0 0 1 0 6H8"/>
              <line x1="4" y1="12" x2="20" y2="12"/>
            </svg>
          </button>
          
          <div class="toolbar-divider"></div>
          
          <button class="toolbar-btn" onclick="formatBlock('H1')" title="Heading 1" data-block="H1" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12h8"/>
              <path d="M4 18V6"/>
              <path d="M12 18V6"/>
              <path d="M17 12l3-2v8"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatBlock('H2')" title="Heading 2" data-block="H2" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12h8"/>
              <path d="M4 18V6"/>
              <path d="M12 18V6"/>
              <path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatBlock('H3')" title="Heading 3" data-block="H3" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12h8"/>
              <path d="M4 18V6"/>
              <path d="M12 18V6"/>
              <path d="M17.5 10.5c1.7-1 3.5 0 3.5 1.5a2 2 0 0 1-2 2"/>
              <path d="M17 17.5c2 1.5 4 .3 4-1.5a2 2 0 0 0-2-2"/>
            </svg>
          </button>
          
          <div class="toolbar-divider"></div>
          
          <button class="toolbar-btn" onclick="formatText('insertUnorderedList')" title="Bullet List" data-command="insertUnorderedList" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>

              <circle cx="4" cy="12" r="1" fill="currentColor"/>
              <circle cx="4" cy="18" r="1" fill="currentColor"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="formatText('insertOrderedList')" title="Numbered List" data-command="insertOrderedList" type="button">

              <line x1="10" y1="6" x2="21" y2="6"/>
              <line x1="10" y1="12" x2="21" y2="12"/>
              <line x1="10" y1="18" x2="21" y2="18"/>

              <path d="M4 10h2"/>
              <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="insertBlockquote()" title="Quote" data-block="BLOCKQUOTE" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
              <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
            </svg>
          </button>
          
          <div class="toolbar-divider"></div>
          
          <button class="toolbar-btn" onclick="insertImage()" title="Insert Image" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="insertLink()" title="Insert Link" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <button class="toolbar-btn" onclick="insertHR()" title="Horizontal Rule" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="editor-area" id="editor" contenteditable="true"></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span id="toastMessage">Post published successfully!</span>
  </div>

  <!-- Hidden input for image upload -->
  <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageInsert(event)">

  <script>
    let coverImageData = '';

    const editorEl = document.getElementById('editor');

    // Cover Image Handling
    function handleCoverImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          coverImageData = e.target.result;
          document.getElementById('coverPreview').src = coverImageData;
          document.getElementById('coverPreview').style.display = 'block';
          document.getElementById('coverPlaceholder').style.display = 'none';
          document.getElementById('removeCover').style.display = 'flex';
          document.getElementById('coverUpload').classList.add('has-image');
        };
        reader.readAsDataURL(file);
      }
    }

    function removeCoverImage(event) {
      event.stopPropagation();
      coverImageData = '';
      document.getElementById('coverPreview').style.display = 'none';
      document.getElementById('coverPlaceholder').style.display = 'flex';
      document.getElementById('removeCover').style.display = 'none';
      document.getElementById('coverUpload').classList.remove('has-image');
      document.getElementById('coverInput').value = '';
    }

    // Text Formatting
    function formatText(command) {
      document.execCommand(command, false, null);
      editorEl.focus();
      updateToolbarState();
    }

    function formatBlock(tag) {
      document.execCommand('formatBlock', false, tag);
      editorEl.focus();
      updateToolbarState();
    }

    function insertBlockquote() {
      document.execCommand('formatBlock', false, 'BLOCKQUOTE');
      editorEl.focus();
      updateToolbarState();
    }

    function insertImage() {
      document.getElementById('imageInput').click();
    }

    function handleImageInsert(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.execCommand('insertImage', false, e.target.result);
          updateToolbarState();
        };
        reader.readAsDataURL(file);
      }
      event.target.value = '';
    }

    function insertLink() {
      const url = prompt('Enter URL:');
      if (url) {
        document.execCommand('createLink', false, url);
        updateToolbarState();
      }
    }

    function insertHR() {
      document.execCommand('insertHorizontalRule', false, null);
      updateToolbarState();
    }

    function updateToolbarState() {
      const buttons = document.querySelectorAll('.toolbar-btn[data-command], .toolbar-btn[data-block]');
      const selection = window.getSelection();
      const hasSelection = selection && selection.rangeCount > 0;

      buttons.forEach((button) => {
        button.classList.remove('active');
      });

      if (!hasSelection) {
        return;
      }

      buttons.forEach((button) => {
        const command = button.dataset.command;
        const block = button.dataset.block;

        try {
          if (command && document.queryCommandState(command)) {
            button.classList.add('active');
          }

          if (block) {
            const currentBlock = (document.queryCommandValue('formatBlock') || '').toUpperCase().replace(/[<>]/g, '');
            if (currentBlock === block.toUpperCase()) {
              button.classList.add('active');
            }
          }
        } catch (e) {
          // Keep toolbar functional even if a command isn't supported.
        }
      });
    }

    // Toast Notification
    function showToast(message, isSuccess = true) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      toastMessage.textContent = message;
      toast.className = 'toast show' + (isSuccess ? ' success' : '');
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // Data helpers - read/write directly from server data.json via PHP endpoint
    let serverData = { posts: [], messages: [] };

    function getPosts() {
      return Array.isArray(serverData.posts) ? serverData.posts : [];
    }

    async function savePosts(posts) {
      const payload = {
        posts,
        messages: Array.isArray(serverData.messages) ? serverData.messages : []
      };

      const resp = await fetch('/api/blogs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await resp.json();
      if (!resp.ok || !result.success) {
        throw new Error(result.error || 'Unable to save data');
      }

      serverData.posts = posts;
    }

    // Load data from data.json on page load
    async function loadDataFromFile() {
      try {
        const resp = await fetch('data.json?' + Date.now(), { cache: 'no-store' });
        if (resp.ok) {
          const data = await resp.json();
          serverData = {
            posts: Array.isArray(data.posts) ? data.posts : [],
            messages: Array.isArray(data.messages) ? data.messages : []
          };
        }
      } catch (e) {
        serverData = { posts: [], messages: [] };
      }
    }

    function generateExcerpt(content) {
      const text = content.replace(/<[^>]*>/g, '').trim();
      return text.length > 150 ? text.substring(0, 150) + '...' : text;
    }

    function formatDate() {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return new Date().toLocaleDateString('en-US', options);
    }

    function saveDraft() {
      showToast('Draft saved!');
    }

    async function publishPost() {
      const title = document.getElementById('postTitle').value.trim();
      const excerpt = document.getElementById('postExcerpt').value.trim();
      const category = document.getElementById('postCategory').value;
      const author = document.getElementById('postAuthor').value.trim();
      const content = document.getElementById('editor').innerHTML;

      if (!title) {
        showToast('Please enter a title', false);
        return;
      }

      if (!content || content === '<br>') {
        showToast('Please add some content', false);
        return;
      }

      try {
        const resp = await fetch('/api/blog', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: title,
            excerpt: excerpt || generateExcerpt(content),
            category: category,
            author: author || 'Kemet Team',
            content: content,
            image: coverImageData || null,
            date: formatDate()
          })
        });

        const result = await resp.json();
        if (!resp.ok || !result.success) {
          showToast('Unable to publish post right now', false);
          return;
        }
      } catch (e) {
        showToast('Unable to publish post right now', false);
        return;
      }

      showToast('Post published successfully!');

      setTimeout(() => {
        window.location.href = 'blogs.html';
      }, 1500);
    }

    // Check for edit mode (supports both ?edit= and ?id=)
    // Must wait for data to load first
    async function initEditMode() {
      await loadDataFromFile();

      const urlParams = new URLSearchParams(window.location.search);
      const editId = urlParams.get('edit') || urlParams.get('id');
      if (editId) {
        const posts = getPosts();
        const post = posts.find(p => p.id === parseInt(editId));
        if (post) {
          document.getElementById('postTitle').value = post.title || '';
          document.getElementById('postExcerpt').value = post.excerpt || '';
          document.getElementById('postCategory').value = post.category || 'Technology';
          document.getElementById('postAuthor').value = post.author || 'Kemet Team';
          document.getElementById('editor').innerHTML = post.content || '';
          if (post.image) {
            coverImageData = post.image;
            document.getElementById('coverPreview').src = post.image;
            document.getElementById('coverPreview').style.display = 'block';
            document.getElementById('coverPlaceholder').style.display = 'none';
            document.getElementById('removeCover').style.display = 'flex';
            document.getElementById('coverUpload').classList.add('has-image');
          }
          document.querySelector('.create-header h1').textContent = 'Edit Post';

          // Update publish to save edits instead of creating new
          document.querySelector('.btn-publish').onclick = async function() {
            const title = document.getElementById('postTitle').value.trim();
            const excerpt = document.getElementById('postExcerpt').value.trim();
            const category = document.getElementById('postCategory').value;
            const author = document.getElementById('postAuthor').value.trim();
            const content = document.getElementById('editor').innerHTML;

            if (!title) { showToast('Please enter a title', false); return; }
            if (!content || content === '<br>') { showToast('Please add some content', false); return; }

            try {
              const resp = await fetch('/api/blog/' + encodeURIComponent(editId), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  title: title,
                  excerpt: excerpt || generateExcerpt(content),
                  category: category,
                  author: author || 'Kemet Team',
                  content: content,
                  image: coverImageData || null,
                  date: formatDate()
                })
              });

              const result = await resp.json();
              if (!resp.ok || !result.success) {
                showToast('Unable to update post right now', false);
                return;
              }
            } catch (e) {
              showToast('Unable to update post right now', false);
              return;
            }

            showToast('Post updated successfully!');
            setTimeout(() => { window.location.href = 'admingeorge.html'; }, 1500);
          };
        }
      }
    }

    // Initialize
    initEditMode();
    document.addEventListener('selectionchange', updateToolbarState);
    editorEl.addEventListener('keyup', updateToolbarState);
    editorEl.addEventListener('mouseup', updateToolbarState);
    editorEl.addEventListener('focus', updateToolbarState);
  </script>
</body>

</html>
